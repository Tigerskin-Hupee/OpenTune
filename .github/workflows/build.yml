name: CI Check

on:
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "temurin"
          cache: 'gradle'

      - name: Accept SDK licenses
        run: yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Build release APK
        run: ./gradlew assembleCoreRelease --stacktrace -DskipFormatKtlint

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenTune-release-pr
          path: app/build/outputs/apk/core/release/*.apk
