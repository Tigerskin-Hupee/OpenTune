name: Build APKs
on:
  workflow_dispatch:
  push:
    branches:
      - canary
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "temurin"
          cache: 'gradle'

      - name: Accept SDK licenses
        run: yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/opentune-release.jks
            echo "storeFile=${{ github.workspace }}/opentune-release.jks" > keystore.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
            echo "Keystore configured."
          else
            echo "No keystore secrets found, will use debug signing."
          fi

      - name: Build release APK
        run: ./gradlew assembleCoreRelease --stacktrace -DskipFormatKtlint

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTune-release
          path: app/build/outputs/apk/core/release/*.apk
