name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "temurin"
          cache: 'gradle'

      - name: Accept SDK licenses
        run: yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/opentune-release.jks
            echo "storeFile=${{ github.workspace }}/opentune-release.jks" > keystore.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          fi

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep -m 1 'versionName\s*=' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          VERSION_CODE=$(grep -m 1 'versionCode\s*=' app/build.gradle.kts | grep -o '[0-9]\+' | head -1)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Build release APK
        run: ./gradlew assembleCoreRelease --stacktrace -DskipFormatKtlint

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: "OpenTune v${{ steps.version.outputs.version_name }}"
          body: |
            ## OpenTune v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})

            ### 安裝說明
            1. 下載 `OpenTune-${{ steps.version.outputs.version_name }}-release.apk`
            2. 直接安裝（無需移除舊版）
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version_name, 'alpha') || contains(steps.version.outputs.version_name, 'beta') }}
          files: app/build/outputs/apk/core/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
